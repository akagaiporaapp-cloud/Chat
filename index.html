<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Clone - Autenticação</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #d1d7db;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* --- TELA DE LOGIN --- */
        .auth-container {
            width: 450px;
            background-color: #fff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            text-align: center;
            border-top: 10px solid #00a884; /* Verde clássico do Whats */
            z-index: 10;
            transition: all 0.5s ease;
        }

        .auth-container.hidden {
            opacity: 0;
            transform: scale(0.9);
            pointer-events: none;
            position: absolute;
        }

        .auth-logo {
            font-size: 50px;
            margin-bottom: 10px;
        }

        .auth-container h2 {
            color: #111b21;
            margin-bottom: 8px;
            font-size: 24px;
            font-weight: 500;
        }

        .auth-container p {
            color: #667781;
            font-size: 14px;
            margin-bottom: 25px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            color: #00a884;
            font-weight: 600;
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            height: 45px;
            padding: 0 12px;
            border: 1px solid #e9edef;
            border-radius: 8px;
            outline: none;
            font-size: 15px;
            background-color: #f0f2f5;
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: #00a884;
            background-color: #fff;
        }

        .auth-btn {
            width: 100%;
            height: 45px;
            background-color: #00a884;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-top: 10px;
        }

        .auth-btn:hover {
            background-color: #008f72;
        }

        .toggle-auth {
            margin-top: 20px;
            font-size: 14px;
            color: #667781;
        }

        .toggle-auth a {
            color: #00a884;
            text-decoration: none;
            font-weight: 600;
        }

        .toggle-auth a:hover {
            text-decoration: underline;
        }


        /* --- INTERFACE DO CHAT (Inicia oculta) --- */
        .app-container {
            display: flex;
            width: 1396px;
            max-width: 100%;
            height: 95vh;
            background-color: #fff;
            box-shadow: 0 6px 18px rgba(0,0,0,0.1);
            opacity: 0;
            transform: scale(1.05);
            transition: all 0.5s ease;
            position: absolute;
            pointer-events: none;
        }

        .app-container.visible {
            opacity: 1;
            transform: scale(1);
            position: relative;
            pointer-events: auto;
        }

        /* Estilos do Chat (Mantidos do passo anterior) */
        .sidebar { width: 35%; min-width: 340px; border-right: 1px solid #e9edef; display: flex; flex-direction: column; background-color: #fff; }
        .header { height: 60px; background-color: #f0f2f5; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background-color: #ccc; object-fit: cover; }
        .chat-list { flex: 1; overflow-y: auto; }
        .chat-item { display: flex; padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f0f2f5; align-items: center; background-color: #ebebeb; }
        .chat-info { flex: 1; margin-left: 15px; }
        .chat-info-header h4 { font-size: 16px; color: #111b21; font-weight: 500; }
        .chat-window { flex: 1; display: flex; flex-direction: column; background-color: #efeae2; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        .chat-messages { flex: 1; padding: 20px 5%; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .message { max-width: 65%; padding: 8px 12px; border-radius: 8px; font-size: 14.2px; position: relative; box-shadow: 0 1px 0.5px rgba(0,0,0,0.13); word-wrap: break-word; }
        .message.received { background-color: #fff; align-self: flex-start; border-top-left-radius: 0; }
        .message.sent { background-color: #d9fdd3; align-self: flex-end; border-top-right-radius: 0; }
        .msg-userId { font-size: 11px; color: #00a884; font-weight: bold; display: block; margin-bottom: 2px; }
        .msg-time { font-size: 11px; color: #667781; text-align: right; margin-top: 4px; display: block; }
        .chat-input-area { height: 62px; background-color: #f0f2f5; padding: 10px 16px; display: flex; align-items: center; gap: 12px; }
        .chat-input-area input { flex: 1; height: 42px; border: none; border-radius: 8px; padding: 0 12px; outline: none; font-size: 15px; }
        .btn-send { background: none; border: none; cursor: pointer; color: #54656f; font-size: 20px; padding: 8px; }
        @media (max-width: 768px) { .sidebar { display: none; } .app-container { height: 100vh; } }
    </style>
</head>
<body>

    <!-- ================= TELA DE LOGIN / CADASTRO ================= -->
    <div class="auth-container" id="authScreen">
        <div class="auth-logo">💬</div>
        <h2 id="authTitle">Criar uma Conta</h2>
        <p id="authSubtitle">Insira seus dados para começar a conversar</p>

        <!-- Campo de Nickname (Opcional no Login, Obrigatório no Cadastro) -->
        <div class="input-group" id="nickGroup">
            <label for="nickInput">NICK / APELIDO</label>
            <input type="text" id="nickInput" placeholder="Como quer ser chamado no chat?">
        </div>

        <div class="input-group">
            <label for="emailInput">E-MAIL</label>
            <input type="email" id="emailInput" placeholder="exemplo@email.com">
        </div>

        <div class="input-group">
            <label for="passwordInput">SENHA</label>
            <input type="password" id="passwordInput" placeholder="Digite sua senha">
        </div>

        <button class="auth-btn" id="authBtn" onclick="handleAuth()">Cadastrar e Entrar</button>

        <div class="toggle-auth">
            <span id="toggleText">Já tem uma conta?</span> 
            <a href="#" id="toggleLink" onclick="toggleAuthMode(event)">Fazer Login</a>
        </div>
    </div>


    <!-- ================= INTERFACE DO CHAT ================= -->
    <div class="app-container" id="chatScreen">
        <aside class="sidebar">
            <div class="header">
                <!-- Foto do perfil logado -->
                <img src="https://picsum.photos/40/40?random=1" alt="Meu Perfil" class="avatar">
                <span id="myDisplayNick" style="font-weight: 600; color: #54656f; font-size: 14px;">Nick</span>
            </div>
            <div class="chat-list">
                <div class="chat-item">
                    <img src="https://picsum.photos/40/40?random=2" alt="Contato" class="avatar">
                    <div class="chat-info">
                        <div class="chat-info-header">
                            <h4>Sala Geral (Firebase)</h4>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <main class="chat-window">
            <div class="header">
                <div style="display: flex; align-items: center; gap: 15px;">
                    <img src="https://picsum.photos/40/40?random=2" alt="Contato" class="avatar">
                    <div>
                        <h4 style="color: #111b21; font-size: 16px; font-weight: 500;">Sala Geral</h4>
                        <span style="color: #667781; font-size: 13px;">Mensagens criptografadas por regras</span>
                    </div>
                </div>
            </div>

            <div class="chat-messages" id="chatMessages"></div>

            <div class="chat-input-area">
                <input type="text" id="messageInput" placeholder="Digite uma mensagem">
                <button class="btn-send" id="btnSend">➤</button>
            </div>
        </main>
    </div>

    <!-- ================= SCRIPTS (FIREBASE E LÓGICA) ================= -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        // IMPORTAÇÃO DO AUTH DO FIREBASE
        import { 
            getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, onAuthStateChanged 
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // Configuração do seu Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyA5EOG4RmeobQtlkvaurl1wCfKq-SXqxic",
            authDomain: "chat-27707.firebaseapp.com",
            projectId: "chat-27707",
            storageBucket: "chat-27707.firebasestorage.app",
            messagingSenderId: "407315203881",
            appId: "1:407315203881:web:22f7e15fdd41623d801938"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Estado da tela (Cadastro ou Login)
        let isSignUpMode = true; 
        let currentUserData = null;

        // Elementos globais de controle de tela
        const authScreen = document.getElementById('authScreen');
        const chatScreen = document.getElementById('chatScreen');

        // Alternar visualmente entre Login e Cadastro
        window.toggleAuthMode = function(e) {
            e.preventDefault();
            isSignUpMode = !isSignUpMode;
            
            const nickGroup = document.getElementById('nickGroup');
            const authTitle = document.getElementById('authTitle');
            const authBtn = document.getElementById('authBtn');
            const toggleText = document.getElementById('toggleText');
            const toggleLink = document.getElementById('toggleLink');

            if (isSignUpMode) {
                authTitle.innerText = "Criar uma Conta";
                nickGroup.style.display = "block";
                authBtn.innerText = "Cadastrar e Entrar";
                toggleText.innerText = "Já tem uma conta?";
                toggleLink.innerText = "Fazer Login";
            } else {
                authTitle.innerText = "Boas-vindas de volta!";
                nickGroup.style.display = "none";
                authBtn.innerText = "Entrar";
                toggleText.innerText = "Não tem uma conta?";
                toggleLink.innerText = "Cadastre-se";
            }
        }

        // Executa a Autenticação (Ação do Botão Principal)
        window.handleAuth = async function() {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            const nick = document.getElementById('nickInput').value.trim();

            if (!email || !password) return alert("Preencha e-mail e senha!");

            try {
                if (isSignUpMode) {
                    if (!nick) return alert("Escolha um Nick para se identificar no chat!");
                    
                    // 1. Cria o usuário no Firebase Auth
                    const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                    
                    // 2. Salva o Nick no perfil do Firebase Auth (displayName)
                    await updateProfile(userCredential.user, { displayName: nick });
                    
                    alert("Conta criada com sucesso!");
                } else {
                    // Realiza o Login tradicional
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (error) {
                alert("Erro na autenticação: " + error.message);
            }
        }

        // --- MONITORADOR DE ESTADO DE AUTENTICAÇÃO ---
        // Verifica se o usuário está logado. Se sim, altera a tela automaticamente.
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserData = user;
                document.getElementById('myDisplayNick').innerText = user.displayName || "Sem Nick";
                
                // Transição de telas
                authScreen.classList.add('hidden');
                chatScreen.classList.add('visible');
                
                // Inicializa o recebimento de mensagens
                startChatListener();
            } else {
                authScreen.classList.remove('hidden');
                chatScreen.classList.remove('visible');
            }
        });

        // --- LÓGICA DO ENVIO DE MENSAGEM ---
        async function sendMessage() {
            const messageInput = document.getElementById('messageInput');
            const text = messageInput.value.trim();
            if (text === '' || !currentUserData) return;

            try {
                await addDoc(collection(db, "messages"), {
                    userId: currentUserData.uid,
                    text: text,
                    // Enviamos o displayName (Nick) fixado no banco para exibir no balão dos outros usuários
                    nick: currentUserData.displayName || "Anônimo", 
                    timestamp: serverTimestamp()
                });
                messageInput.value = '';
            } catch (error) {
                console.error("Erro ao enviar:", error);
            }
        }

        // --- ESCUTAR CHAT EM TEMPO REAL ---
        function startChatListener() {
            const chatMessages = document.getElementById('chatMessages');
            const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));

            onSnapshot(q, (snapshot) => {
                chatMessages.innerHTML = '';
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (!data.timestamp) return;

                    const isMe = data.userId === currentUserData.uid;
                    const messageClass = isMe ? 'sent' : 'received';

                    const date = data.timestamp.toDate();
                    const timeStr = date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

                    const messageDiv = document.createElement('div');
                    messageDiv.className = `message ${messageClass}`;
                    
                    // Exibe o Nick de quem enviou caso seja outra pessoa
                    const nameTag = isMe ? '' : `<span class="msg-userId">${data.nick || 'Usuário'}</span>`;
                    
                    messageDiv.innerHTML = `
                        ${nameTag}
                        ${data.text}
                        <span class="msg-time">${timeStr}</span>
                    `;
                    chatMessages.appendChild(messageDiv);
                });
                chatMessages.scrollTop = chatMessages.scrollHeight;
            });
        }

        // Ativação dos botões da interface de conversa
        document.getElementById('btnSend').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
